<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="index, follow">
    <meta
      name="description"
      content="Ford Everest family getaway picnic creative for Google Display image discovery."
    >
    <title>Ford Everest Family Getaway</title>
    <link rel="preload" as="image" href="picnic.png">
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f4f6f8;
        font-family: Arial, Helvetica, sans-serif;
      }

      main {
        width: min(100%, 600px);
      }

      img {
        display: block;
        width: 100%;
        height: auto;
      }
    </style>
  </head>
  <body>
    <main>
      <img
        src="assets/picnic.png"
        width="600"
        height="500"
        alt="Ford Everest family picnic getaway advertisement beside a lake and mountains"
        fetchpriority="high"
      >
    </main>
  </body>
</html>
